name: Kaggle Embedding Pipeline

# Dataset ảnh phải được upload lên Kaggle thủ công 1 lần trước:
#   uv run python kaggle_dataset.py --folder dataset
# Sau đó workflow này chỉ push notebook + chạy GPU + tải embedding về.

on:
  workflow_dispatch:
    inputs:
      notebook_type:
        description: 'Notebook type'
        required: true
        type: choice
        options:
          - siglip2
          - dinov3
          - dinov3_dense
      dataset_slug:
        description: 'Kaggle dataset slug (must already exist on Kaggle)'
        required: true
        default: 'anhpham2710/dataset'

jobs:
  run-kaggle-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install kaggle h5py faiss-cpu numpy

      - name: Setup Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -z "$KAGGLE_USERNAME" ] || [ -z "$KAGGLE_KEY" ]; then
            echo "Error: KAGGLE_USERNAME or KAGGLE_KEY secret is not set"
            echo "Go to: Settings > Secrets and variables > Actions"
            exit 1
          fi
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "Kaggle credentials configured for user: $KAGGLE_USERNAME"

      - name: Run Kaggle pipeline
        run: |
          python kaggle_pipeline.py \
            --type ${{ inputs.notebook_type }} \
            --dataset-slug ${{ inputs.dataset_slug }} \
            --auto-download

      - name: Upload embeddings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: embeddings-${{ inputs.notebook_type }}
          path: result/
          retention-days: 7
